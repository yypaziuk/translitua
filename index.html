<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Транслітерація</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #4ED17A;
            color: white;
            padding: 28px 32px;
            text-align: center;
        }

        header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
        header p  { font-size: 14px; opacity: 0.85; }

        .mode-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 24px 20px 0;
        }

        .mode-btn {
            padding: 8px 22px;
            border: 2px solid #4ED17A;
            border-radius: 20px;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .mode-btn.active {
            background: #4ED17A;
            color: white;
        }

        .mode-hint {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

        .container {
            max-width: 920px;
            width: 100%;
            margin: 20px auto 40px;
            padding: 0 20px;
            flex: 1;
        }

        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .col { padding: 24px; }
        .col:first-child { border-right: 1px solid #eee; }

        .col-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .col-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #888;
        }

        textarea {
            width: 100%;
            height: 210px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 15px;
            line-height: 1.65;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
            color: #1a1a1a;
        }

        #sourceText:focus { border-color: #4ED17A; }
        #resultText { background: #fafafa; cursor: default; }

        .col-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .char-count { font-size: 12px; color: #bbb; }

        .btn {
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1.5px solid;
            transition: background 0.15s, color 0.15s;
        }

        .btn-clear {
            border-color: #ddd;
            background: white;
            color: #777;
        }

        .btn-clear:hover { background: #f5f5f5; }

        .btn-copy {
            border-color: #4ED17A;
            background: white;
            color: #4ED17A;
        }

        .btn-copy:hover, .btn-copy.copied {
            background: #4ED17A;
            color: white;
        }

        @media (max-width: 580px) {
            .cols { grid-template-columns: 1fr; }
            .col:first-child { border-right: none; border-bottom: 1px solid #eee; }
        }
    </style>
</head>
<body>

<header>
    <h1>Транслітерація українських імен</h1>
    <p>Переведення кирилиці в латиницю</p>
</header>

<div class="mode-bar">
    <button class="mode-btn active" data-mode="a3">A3 / УКППТ-1996</button>
    <button class="mode-btn" data-mode="kmu">КМУ 2010 (офіційний)</button>
</div>
<div class="mode-hint" id="modeHint">Географічна транслітерація — спрощені правила для топонімів</div>

<div class="container">
    <div class="card">
        <div class="cols">
            <div class="col">
                <div class="col-header">
                    <span class="col-label">Українська</span>
                    <button class="btn btn-clear" id="clearBtn">Очистити</button>
                </div>
                <textarea id="sourceText" placeholder="Введіть текст..."></textarea>
                <div class="col-footer">
                    <span class="char-count" id="srcCount">0 символів</span>
                </div>
            </div>
            <div class="col">
                <div class="col-header">
                    <span class="col-label">Латиниця</span>
                    <button class="btn btn-copy" id="copyBtn">Копіювати</button>
                </div>
                <textarea id="resultText" readonly placeholder="Результат з'явиться тут..."></textarea>
                <div class="col-footer">
                    <span class="char-count" id="resCount">0 символів</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    var currentMode = 'a3';

    var modeHints = {
        a3:  'Географічна транслітерація — спрощені правила для топонімів',
        kmu: 'Офіційна транслітерація за постановою КМУ №55 від 27.01.2010'
    };

    function translitA3(s) {
        return (s || '')
            .replace(/іє/g,'ie').replace(/Іє/g,'Ie')
            .replace(/ія/g,'ia').replace(/Ія/g,'Ia')
            .replace(/зг/g,'zgh').replace(/Зг/g,'Zgh')
            .replace(/ьо/g,'io')
            .replace(/а/g,'a').replace(/б/g,'b').replace(/в/g,'v')
            .replace(/г/g,'h').replace(/ґ/g,'g').replace(/д/g,'d').replace(/е/g,'e')
            .replace(/(^|\s)є/g,'$1ye').replace(/є/g,'ie')
            .replace(/ж/g,'zh').replace(/з/g,'z').replace(/и/g,'y').replace(/і/g,'i')
            .replace(/(^|\s)ї/g,'$1yi').replace(/ї/g,'i')
            .replace(/(^|\s)й/g,'$1y').replace(/й/g,'i')
            .replace(/к/g,'k').replace(/л/g,'l').replace(/м/g,'m').replace(/н/g,'n')
            .replace(/о/g,'o').replace(/п/g,'p').replace(/р/g,'r').replace(/с/g,'s')
            .replace(/т/g,'t').replace(/у/g,'u').replace(/ф/g,'f').replace(/х/g,'kh')
            .replace(/ц/g,'ts').replace(/ч/g,'ch').replace(/ш/g,'sh').replace(/щ/g,'sch')
            .replace(/ь/g,'')
            .replace(/(^|\s)ю/g,'$1yu').replace(/ю/g,'iu')
            .replace(/(^|\s)я/g,'$1ya').replace(/я/g,'ia')
            .replace(/А/g,'A').replace(/Б/g,'B').replace(/В/g,'V')
            .replace(/Г/g,'H').replace(/Ґ/g,'G').replace(/Д/g,'D').replace(/Е/g,'E')
            .replace(/(^|\s)Є/g,'$1Ye').replace(/Є/g,'Ie')
            .replace(/Ж/g,'Zh').replace(/З/g,'Z').replace(/И/g,'Y').replace(/І/g,'I')
            .replace(/(^|\s)Ї/g,'$1Yi').replace(/Ї/g,'I')
            .replace(/(^|\s)Й/g,'$1Y').replace(/Й/g,'I')
            .replace(/К/g,'K').replace(/Л/g,'L').replace(/М/g,'M').replace(/Н/g,'N')
            .replace(/О/g,'O').replace(/П/g,'P').replace(/Р/g,'R').replace(/С/g,'S')
            .replace(/Т/g,'T').replace(/У/g,'U').replace(/Ф/g,'F').replace(/Х/g,'Kh')
            .replace(/Ц/g,'Ts').replace(/Ч/g,'Ch').replace(/Ш/g,'Sh').replace(/Щ/g,'Sch')
            .replace(/Ь/g,'')
            .replace(/(^|\s)Ю/g,'$1Yu').replace(/Ю/g,'Iu')
            .replace(/(^|\s)Я/g,'$1Ya').replace(/Я/g,'Ia')
            .replace(/'/g,'').replace(/'/g,'');
    }

    function translitKMU(s) {
        return (s || '')
            .replace(/зг/g,'zgh').replace(/Зг/g,'Zgh')
            .replace(/а/g,'a').replace(/б/g,'b').replace(/в/g,'v')
            .replace(/г/g,'h').replace(/ґ/g,'g').replace(/д/g,'d').replace(/е/g,'e')
            .replace(/(^|\s)є/g,'$1ye').replace(/є/g,'ie')
            .replace(/ж/g,'zh').replace(/з/g,'z').replace(/и/g,'y').replace(/і/g,'i')
            .replace(/(^|\s)ї/g,'$1yi').replace(/ї/g,'i')
            .replace(/(^|\s)й/g,'$1y').replace(/й/g,'i')
            .replace(/к/g,'k').replace(/л/g,'l').replace(/м/g,'m').replace(/н/g,'n')
            .replace(/о/g,'o').replace(/п/g,'p').replace(/р/g,'r').replace(/с/g,'s')
            .replace(/т/g,'t').replace(/у/g,'u').replace(/ф/g,'f').replace(/х/g,'kh')
            .replace(/ц/g,'ts').replace(/ч/g,'ch').replace(/ш/g,'sh').replace(/щ/g,'shch')
            .replace(/ь/g,'')
            .replace(/(^|\s)ю/g,'$1yu').replace(/ю/g,'iu')
            .replace(/(^|\s)я/g,'$1ya').replace(/я/g,'ia')
            .replace(/А/g,'A').replace(/Б/g,'B').replace(/В/g,'V')
            .replace(/Г/g,'H').replace(/Ґ/g,'G').replace(/Д/g,'D').replace(/Е/g,'E')
            .replace(/(^|\s)Є/g,'$1Ye').replace(/Є/g,'Ie')
            .replace(/Ж/g,'Zh').replace(/З/g,'Z').replace(/И/g,'Y').replace(/І/g,'I')
            .replace(/(^|\s)Ї/g,'$1Yi').replace(/Ї/g,'I')
            .replace(/(^|\s)Й/g,'$1Y').replace(/Й/g,'I')
            .replace(/К/g,'K').replace(/Л/g,'L').replace(/М/g,'M').replace(/Н/g,'N')
            .replace(/О/g,'O').replace(/П/g,'P').replace(/Р/g,'R').replace(/С/g,'S')
            .replace(/Т/g,'T').replace(/У/g,'U').replace(/Ф/g,'F').replace(/Х/g,'Kh')
            .replace(/Ц/g,'Ts').replace(/Ч/g,'Ch').replace(/Ш/g,'Sh').replace(/Щ/g,'Shch')
            .replace(/Ь/g,'')
            .replace(/(^|\s)Ю/g,'$1Yu').replace(/Ю/g,'Iu')
            .replace(/(^|\s)Я/g,'$1Ya').replace(/Я/g,'Ia')
            .replace(/'/g,'').replace(/'/g,'');
    }

    function update() {
        var src = document.getElementById('sourceText').value;
        var result = currentMode === 'a3' ? translitA3(src) : translitKMU(src);
        document.getElementById('resultText').value = result;
        document.getElementById('srcCount').textContent = src.length + ' символів';
        document.getElementById('resCount').textContent = result.length + ' символів';
        if (window.localStorage) localStorage.setItem('savedSrc', src);
    }

    document.getElementById('sourceText').addEventListener('input', update);

    document.querySelectorAll('.mode-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            document.getElementById('modeHint').textContent = modeHints[currentMode];
            update();
        });
    });

    document.getElementById('clearBtn').addEventListener('click', function() {
        document.getElementById('sourceText').value = '';
        update();
        document.getElementById('sourceText').focus();
    });

    document.getElementById('copyBtn').addEventListener('click', function() {
        var text = document.getElementById('resultText').value;
        if (!text) return;
        var btn = this;
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Скопійовано!';
            btn.classList.add('copied');
            setTimeout(function() {
                btn.textContent = 'Копіювати';
                btn.classList.remove('copied');
            }, 1800);
        });
    });

    if (window.localStorage) {
        var saved = localStorage.getItem('savedSrc') || '';
        document.getElementById('sourceText').value = saved;
    }
    update();
</script>

</body>
</html>
